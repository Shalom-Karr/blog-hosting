<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8">
  <title>Profile · Your Name</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="layout">
    <aside class="sidebar-left">
      <div class="profile">
        <img src="https://via.placeholder.com/100" alt="Avatar" class="avatar">
        <h1>Your Name</h1>
        <p>Short bio describing your passions and work.</p>
      </div>
      <nav>
        <a href="/">Profile</a>
        <a href="/blog/">Blog</a>
      </nav>
      <button id="theme-toggle" class="theme-btn">Toggle Theme</button>
    </aside>

    <main class="content">
      <div class="profile-page">
        <h2>Welcome!</h2>
        <p>This is the profile page root. You can redirect this to your actual portfolio or build it out here.</p>
        <a href="/blog/">Read my Blog &rarr;</a>
      </div>
    </main>

    <aside class="sidebar-right">
      <div class="widget">
        <!-- Optional extra widgets for index -->
      </div>
    </aside>
  </div>
  <script src="/js/app.js"></script>
</body>
</html>
