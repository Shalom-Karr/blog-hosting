<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Profile · Your Name</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' }</script>
</head>
<body class="bg-gray-50 text-gray-900 dark:bg-gray-900 dark:text-gray-100 transition-colors duration-300">
  <div class="max-w-7xl mx-auto min-h-screen lg:grid lg:grid-cols-[250px_1fr_250px] border-x border-gray-200 dark:border-gray-800 bg-white dark:bg-gray-900 shadow-sm">
    
    <!-- Left Sidebar -->
    <aside class="p-8 border-b lg:border-b-0 lg:border-r border-gray-200 dark:border-gray-800 bg-gray-50 dark:bg-gray-800/50 flex flex-col items-center lg:items-start text-center lg:text-left">
      <img src="https://via.placeholder.com/100" alt="Avatar" class="w-24 h-24 rounded-full object-cover mb-4 shadow-md">
      <h1 class="text-xl font-bold mb-2">Your Name</h1>
      <p class="text-sm text-gray-600 dark:text-gray-400 mb-8">Short bio describing your passions and work.</p>
      
      <nav class="flex flex-col gap-3 w-full mb-8">
        <a href="/" class="font-medium text-blue-600 dark:text-blue-400 hover:underline">Profile</a>
        <a href="/blog/" class="font-medium hover:text-blue-600 dark:hover:text-blue-400 transition-colors">Blog</a>
      </nav>
      
      <button id="theme-toggle" class="w-full py-2 px-4 border border-gray-300 dark:border-gray-600 rounded hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors text-sm font-medium">Toggle Theme</button>
    </aside>

    <!-- Main Content -->
    <main class="p-8 lg:p-12">
      <div class="prose dark:prose-invert max-w-none">
        <h2 class="text-3xl font-bold mb-4">Welcome!</h2>
        <p class="text-lg text-gray-700 dark:text-gray-300 mb-6">This is the profile page root. You can redirect this to your actual portfolio or build it out here.</p>
        <a href="/blog/" class="inline-block bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-6 rounded transition-colors no-underline">Read my Blog &rarr;</a>
      </div>
    </main>

    <!-- Right Sidebar -->
    <aside class="hidden lg:block p-8 border-l border-gray-200 dark:border-gray-800 bg-gray-50 dark:bg-gray-800/50">
      <div class="mb-8">
        <!-- Optional extra widgets -->
      </div>
    </aside>

  </div>
  <script src="/js/app.js"></script>
</body>
</html>
