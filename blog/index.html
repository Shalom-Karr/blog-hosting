<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8">
  <title>Blog · Your Name</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="/css/style.css">
  
  <!-- Supabase v2 Library -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <div class="layout">
    <aside class="sidebar-left">
      <div class="profile">
        <img src="https://via.placeholder.com/100" alt="Avatar" class="avatar">
        <h1>Your Name</h1>
        <p>Short bio describing your passions and work.</p>
      </div>
      <nav>
        <a href="/">Profile</a>
        <a href="/blog/">Blog</a>
      </nav>
      <button id="theme-toggle" class="theme-btn">Toggle Theme</button>
    </aside>

    <main class="content">
      <h1>Latest Posts</h1>
      <div id="posts-container">
        <p>Loading posts...</p>
      </div>
    </main>

    <aside class="sidebar-right">
      <div class="widget search-widget">
        <!-- Tag cloud or search could go here -->
      </div>
    </aside>
  </div>

  <script src="/js/supabase-client.js"></script>
  <script src="/js/app.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", async () => {
      const container = document.getElementById('posts-container');
      try {
        const { data: posts, error } = await supabaseClient
          .from('posts')
          .select('*')
          .eq('is_published', true)
          .order('created_at', { ascending: false });

        if (error) throw error;

        if (posts.length === 0) {
          container.innerHTML = '<p>No posts published yet.</p>';
          return;
        }

        container.innerHTML = posts.map(post => `
          <article class="post-entry">
            <h2><a href="/blog/post.html?slug=${post.slug}">${post.title}</a></h2>
            <div class="meta">
              <small>${new Date(post.created_at).toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' })}</small>
            </div>
            <div class="excerpt">
              ${post.excerpt || ""}
            </div>
          </article>
        `).join('');
      } catch (err) {
        console.error('Error fetching posts:', err);
        container.innerHTML = '<p style="color:red;">Failed to load posts. Have you configured Supabase?</p>';
      }
    });
  </script>
</body>
</html>
