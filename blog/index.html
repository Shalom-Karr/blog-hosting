<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Blog · Your Name</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' }</script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-50 text-gray-900 dark:bg-gray-900 dark:text-gray-100 transition-colors duration-300">
  <div class="max-w-7xl mx-auto min-h-screen lg:grid lg:grid-cols-[250px_1fr_250px] border-x border-gray-200 dark:border-gray-800 bg-white dark:bg-gray-900 shadow-sm">
    
    <aside class="p-8 border-b lg:border-b-0 lg:border-r border-gray-200 dark:border-gray-800 bg-gray-50 dark:bg-gray-800/50 flex flex-col items-center lg:items-start text-center lg:text-left">
      <img src="https://via.placeholder.com/100" alt="Avatar" class="w-24 h-24 rounded-full object-cover mb-4 shadow-md">
      <h1 class="text-xl font-bold mb-2">Your Name</h1>
      <p class="text-sm text-gray-600 dark:text-gray-400 mb-8">Short bio describing your passions and work.</p>
      
      <nav class="flex flex-col gap-3 w-full mb-8">
        <a href="/" class="font-medium hover:text-blue-600 dark:hover:text-blue-400 transition-colors">Profile</a>
        <a href="/blog/" class="font-medium text-blue-600 dark:text-blue-400 hover:underline">Blog</a>
      </nav>
      
      <button id="theme-toggle" class="w-full py-2 px-4 border border-gray-300 dark:border-gray-600 rounded hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors text-sm font-medium">Toggle Theme</button>
    </aside>

    <main class="p-8 lg:p-12">
      <h1 class="text-3xl font-bold mb-8 pb-4 border-b border-gray-200 dark:border-gray-800">Latest Posts</h1>
      <div id="posts-container" class="space-y-10">
        <p class="text-gray-500 animate-pulse">Loading posts...</p>
      </div>
    </main>

    <aside class="hidden lg:block p-8 border-l border-gray-200 dark:border-gray-800 bg-gray-50 dark:bg-gray-800/50">
      <div class="mb-8">
        <h3 class="font-bold mb-4 uppercase text-sm tracking-wider text-gray-500">Search</h3>
        <input type="text" placeholder="Search posts..." class="w-full border dark:border-gray-600 rounded px-3 py-2 bg-white dark:bg-gray-700 focus:ring-2 focus:ring-blue-500 outline-none text-sm">
      </div>
    </aside>

  </div>

  <script src="/js/supabase-client.js"></script>
  <script src="/js/app.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", async () => {
      const container = document.getElementById('posts-container');
      try {
        const { data: posts, error } = await supabaseClient
          .from('posts')
          .select('*')
          .eq('is_published', true)
          .order('created_at', { ascending: false });

        if (error) throw error;

        if (posts.length === 0) {
          container.innerHTML = '<p class="text-gray-500">No posts published yet.</p>';
          return;
        }

        container.innerHTML = posts.map(post => `
          <article class="group">
            <h2 class="text-2xl font-bold mb-2"><a href="/blog/post.html?slug=${post.slug}" class="hover:text-blue-600 dark:hover:text-blue-400 transition-colors">${post.title}</a></h2>
            <div class="text-sm text-gray-500 dark:text-gray-400 mb-3">
              ${new Date(post.created_at).toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' })}
            </div>
            <p class="text-gray-700 dark:text-gray-300 leading-relaxed">
              ${post.excerpt || ""}
            </p>
            <a href="/blog/post.html?slug=${post.slug}" class="inline-block mt-3 text-sm font-bold text-blue-600 dark:text-blue-400 group-hover:underline">Read more &rarr;</a>
          </article>
        `).join('<hr class="border-gray-200 dark:border-gray-800">');
      } catch (err) {
        console.error('Error fetching posts:', err);
        container.innerHTML = '<p class="text-red-500">Failed to load posts. Have you configured Supabase?</p>';
      }
    });
  </script>
</body>
</html>
