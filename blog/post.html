<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Post · Your Name</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
  <script>tailwind.config = { darkMode: 'class' }</script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body class="bg-gray-50 text-gray-900 dark:bg-gray-900 dark:text-gray-100 transition-colors duration-300">
  <div class="max-w-7xl mx-auto min-h-screen lg:grid lg:grid-cols-[250px_1fr_250px] border-x border-gray-200 dark:border-gray-800 bg-white dark:bg-gray-900 shadow-sm">
    
    <aside class="p-8 border-b lg:border-b-0 lg:border-r border-gray-200 dark:border-gray-800 bg-gray-50 dark:bg-gray-800/50 flex flex-col items-center lg:items-start text-center lg:text-left">
      <img src="https://via.placeholder.com/100" alt="Avatar" class="w-24 h-24 rounded-full object-cover mb-4 shadow-md">
      <h1 class="text-xl font-bold mb-2">Your Name</h1>
      
      <nav class="flex flex-col gap-3 w-full mb-8 mt-6">
        <a href="/" class="font-medium hover:text-blue-600 dark:hover:text-blue-400 transition-colors">Profile</a>
        <a href="/blog/" class="font-medium text-blue-600 dark:text-blue-400 hover:underline">&larr; Back to Blog</a>
      </nav>
      
      <button id="theme-toggle" class="w-full py-2 px-4 border border-gray-300 dark:border-gray-600 rounded hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors text-sm font-medium">Toggle Theme</button>
    </aside>

    <main class="p-8 lg:p-12 lg:col-span-2">
      <article id="post-container" class="max-w-3xl mx-auto">
        <p class="text-gray-500 animate-pulse">Loading post...</p>
      </article>
    </main>

  </div>

  <script src="/js/supabase-client.js"></script>
  <script src="/js/app.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", async () => {
      const urlParams = new URLSearchParams(window.location.search);
      const slug = urlParams.get('slug');
      const container = document.getElementById('post-container');

      if (!slug) {
        container.innerHTML = '<p class="text-gray-500">No post specified.</p>';
        return;
      }

      try {
        const { data: post, error } = await supabaseClient
          .from('posts')
          .select('*')
          .eq('slug', slug)
          .eq('is_published', true)
          .single();

        if (error || !post) {
          throw new Error('Post not found');
        }

        document.title = `${post.title} · Your Name`;

        const htmlContent = marked.parse(post.content_md);
        
        const tagsHtml = post.tags && post.tags.length > 0 
          ? post.tags.map(t => `<span class="bg-blue-100 text-blue-800 dark:bg-blue-900 dark:text-blue-200 text-xs font-semibold px-2.5 py-0.5 rounded">${t}</span>`).join(' ')
          : '';

        container.innerHTML = `
          <header class="mb-10 pb-8 border-b border-gray-200 dark:border-gray-800">
            <h1 class="text-4xl font-extrabold tracking-tight mb-4">${post.title}</h1>
            <div class="flex flex-wrap items-center gap-4 text-sm text-gray-500 dark:text-gray-400">
              <time datetime="${post.created_at}">${new Date(post.created_at).toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' })}</time>
              ${tagsHtml ? `<div class="flex gap-2">${tagsHtml}</div>` : ''}
            </div>
          </header>
          <div class="prose dark:prose-invert prose-blue max-w-none lg:prose-lg">
            ${htmlContent}
          </div>
        `;
      } catch (err) {
        console.error('Error fetching post:', err);
        container.innerHTML = '<h1 class="text-3xl font-bold mb-4">404</h1><p class="text-gray-500">The post could not be found.</p>';
      }
    });
  </script>
</body>
</html>
